name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  deploy:
    needs: check-changes
    if: needs.check-changes.outputs.backend == 'true' || needs.check-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: needs.check-changes.outputs.backend == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build jar
        if: needs.check-changes.outputs.backend == 'true'
        run: cd backend && chmod +x gradlew && ./gradlew bootJar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        if: needs.check-changes.outputs.backend == 'true'
        run: |
          docker build -t kimkitae510/gamercommunity-backend:latest ./backend
          docker push kimkitae510/gamercommunity-backend:latest

      - name: Build and push Frontend image
        if: needs.check-changes.outputs.frontend == 'true'
        run: |
          docker build -t kimkitae510/gamercommunity-frontend:latest ./frontend
          docker push kimkitae510/gamercommunity-frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: 100.51.108.228
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull kimkitae510/gamercommunity-backend:latest
            docker pull kimkitae510/gamercommunity-frontend:latest
            cd ~
            docker-compose down
            docker-compose up -d
