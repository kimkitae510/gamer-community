<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    text { fill: #393939; }
    .t14 { font-size: 13px; font-weight: 500; }
    .t12 { font-size: 11px; fill: #6b6b6b; }
    .t11 { font-size: 10px; fill: #888; }
    .layer { font-size: 10px; font-weight: 600; fill: #aaa; letter-spacing: 1px; }
    .conn { stroke: #bbb; stroke-width: 0.8; fill: none; }
    .conn-d { stroke: #bbb; stroke-width: 0.8; fill: none; stroke-dasharray: 4 3; }
    .box { fill: #fafafa; stroke: #d4d4d4; stroke-width: 0.8; }
    .box-app { fill: none; stroke: #c8c8c8; stroke-width: 0.8; stroke-dasharray: 6 3; }
    .box-infra { fill: #f4f6f4; stroke: #bcc8bc; stroke-width: 0.8; }
    .box-ext { fill: #f6f4f0; stroke: #c8c0b8; stroke-width: 0.8; }
    marker path { fill: #aaa; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1.5L9 5L1 8.5Z"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect class="box" x="310" y="16" width="140" height="36" rx="4"/>
  <text class="t14" x="380" y="38" text-anchor="middle">Client (React)</text>

  <!-- Arrow: Client → App -->
  <line class="conn" x1="380" y1="52" x2="380" y2="82" marker-end="url(#a)"/>
  <text class="t11" x="394" y="72">REST</text>

  <!-- Spring Boot App container -->
  <rect class="box-app" x="60" y="82" width="640" height="260" rx="8"/>
  <text class="layer" x="80" y="102">SPRING BOOT</text>

  <!-- Auth layer -->
  <rect class="box" x="100" y="112" width="560" height="32" rx="4"/>
  <text class="t14" x="380" y="132" text-anchor="middle">Spring Security · JWT Authentication</text>

  <!-- Domain modules -->
  <rect class="box" x="100" y="164" width="108" height="44" rx="4"/>
  <text class="t14" x="154" y="182" text-anchor="middle">Post</text>
  <text class="t12" x="154" y="198" text-anchor="middle">게시글 · 태그</text>

  <rect class="box" x="220" y="164" width="108" height="44" rx="4"/>
  <text class="t14" x="274" y="182" text-anchor="middle">Review</text>
  <text class="t12" x="274" y="198" text-anchor="middle">평점 · 집계</text>

  <rect class="box" x="340" y="164" width="108" height="44" rx="4"/>
  <text class="t14" x="394" y="182" text-anchor="middle">Comment</text>
  <text class="t12" x="394" y="198" text-anchor="middle">댓글 · 대댓글</text>

  <rect class="box" x="460" y="164" width="108" height="44" rx="4"/>
  <text class="t14" x="514" y="182" text-anchor="middle">AI Comment</text>
  <text class="t12" x="514" y="198" text-anchor="middle">비동기 폴링</text>

  <rect class="box" x="580" y="164" width="100" height="44" rx="4"/>
  <text class="t14" x="630" y="182" text-anchor="middle">Like</text>
  <text class="t12" x="630" y="198" text-anchor="middle">추천 · 취소</text>

  <!-- Support modules -->
  <rect class="box" x="100" y="228" width="128" height="44" rx="4"/>
  <text class="t14" x="164" y="246" text-anchor="middle">Popular Score</text>
  <text class="t12" x="164" y="262" text-anchor="middle">인기글 · 체크포인트</text>

  <rect class="box" x="240" y="228" width="128" height="44" rx="4"/>
  <text class="t14" x="304" y="246" text-anchor="middle">View Count</text>
  <text class="t12" x="304" y="262" text-anchor="middle">인메모리 Write-Back</text>

  <rect class="box" x="380" y="228" width="128" height="44" rx="4"/>
  <text class="t14" x="444" y="246" text-anchor="middle">Category Stats</text>
  <text class="t12" x="444" y="262" text-anchor="middle">일간/주간/월간</text>

  <rect class="box" x="520" y="228" width="128" height="44" rx="4"/>
  <text class="t14" x="584" y="246" text-anchor="middle">News Crawler</text>
  <text class="t12" x="584" y="262" text-anchor="middle">스케줄러</text>

  <!-- Arrows: Auth → Domain -->
  <line class="conn" x1="154" y1="144" x2="154" y2="164" marker-end="url(#a)"/>
  <line class="conn" x1="274" y1="144" x2="274" y2="164" marker-end="url(#a)"/>
  <line class="conn" x1="394" y1="144" x2="394" y2="164" marker-end="url(#a)"/>
  <line class="conn" x1="514" y1="144" x2="514" y2="164" marker-end="url(#a)"/>
  <line class="conn" x1="630" y1="144" x2="630" y2="164" marker-end="url(#a)"/>

  <!-- Arrows: Domain → Support (dashed) -->
  <line class="conn-d" x1="154" y1="208" x2="164" y2="228"/>
  <line class="conn-d" x1="154" y1="208" x2="304" y2="228"/>
  <line class="conn-d" x1="394" y1="208" x2="444" y2="228"/>

  <!-- Arrows: App → Infra -->
  <line class="conn" x1="200" y1="296" x2="200" y2="310" />

  <!-- Vertical lines from app bottom to infra -->
  <line class="conn" x1="164" y1="342" x2="164" y2="392" marker-end="url(#a)"/>
  <line class="conn" x1="340" y1="342" x2="340" y2="392" marker-end="url(#a)"/>
  <line class="conn" x1="510" y1="342" x2="510" y2="392" marker-end="url(#a)"/>

  <!-- Labels on infra arrows -->
  <text class="t11" x="178" y="374">JPA</text>
  <text class="t11" x="354" y="374">Lettuce</text>
  <text class="t11" x="524" y="374">SDK</text>

  <!-- Infrastructure -->
  <rect class="box-infra" x="100" y="392" width="130" height="40" rx="4"/>
  <text class="t14" x="165" y="416" text-anchor="middle">MySQL 8.0</text>

  <rect class="box-infra" x="275" y="392" width="130" height="40" rx="4"/>
  <text class="t14" x="340" y="416" text-anchor="middle">Redis</text>

  <rect class="box-infra" x="445" y="392" width="130" height="40" rx="4"/>
  <text class="t14" x="510" y="416" text-anchor="middle">AWS S3</text>

  <!-- External services -->
  <line class="conn-d" x1="514" y1="208" x2="660" y2="392" marker-end="url(#a)"/>
  <text class="t11" x="610" y="310">Async</text>

  <rect class="box-ext" x="615" y="392" width="130" height="40" rx="4"/>
  <text class="t14" x="680" y="416" text-anchor="middle">OpenAI API</text>

  <!-- Monitoring -->
  <line class="conn-d" x1="165" y1="432" x2="165" y2="468" marker-end="url(#a)"/>

  <rect class="box-ext" x="100" y="468" width="190" height="36" rx="4"/>
  <text class="t14" x="195" y="490" text-anchor="middle">Prometheus · Grafana</text>
  <text class="t11" x="304" y="490">Actuator</text>
</svg>
