<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <style>
    text { fill: #393939; }
    .t14 { font-size: 13px; font-weight: 500; }
    .t12 { font-size: 11px; fill: #6b6b6b; }
    .layer { font-size: 10px; font-weight: 600; fill: #999; letter-spacing: 1.2px; }
    .line { stroke: #c0c0c0; stroke-width: 0.8; }
    .line-d { stroke: #c0c0c0; stroke-width: 0.8; stroke-dasharray: 4 3; }
    .box { fill: #fafafa; stroke: #d4d4d4; stroke-width: 0.8; }
    .box-acc { fill: #f5f5f0; stroke: #c8c8be; stroke-width: 0.8; }
    .box-infra { fill: #f0f4f0; stroke: #b8c4b8; stroke-width: 0.8; }
    .box-ext { fill: #f4f0f0; stroke: #c8bcbc; stroke-width: 0.8; }
    marker path { fill: #b0b0b0; }
  </style>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M1 1.5L9 5L1 8.5Z"/>
    </marker>
  </defs>

  <!-- Client -->
  <text class="layer" x="20" y="36">CLIENT</text>
  <rect class="box" x="290" y="20" width="140" height="36" rx="4"/>
  <text class="t14" x="360" y="42" text-anchor="middle">Client</text>

  <!-- Security -->
  <text class="layer" x="20" y="96">SECURITY</text>
  <rect class="box-acc" x="100" y="78" width="520" height="36" rx="4"/>
  <text class="t14" x="360" y="100" text-anchor="middle">Spring Security · JWT · BCrypt</text>

  <line class="line" x1="360" y1="56" x2="360" y2="78" marker-end="url(#a)"/>

  <!-- Domain -->
  <text class="layer" x="20" y="162">DOMAIN</text>

  <line class="line" x1="168" y1="114" x2="168" y2="144" marker-end="url(#a)"/>
  <line class="line" x1="320" y1="114" x2="320" y2="144" marker-end="url(#a)"/>
  <line class="line" x1="472" y1="114" x2="472" y2="144" marker-end="url(#a)"/>
  <line class="line" x1="608" y1="114" x2="608" y2="144" marker-end="url(#a)"/>

  <rect class="box" x="100" y="144" width="136" height="50" rx="4"/>
  <text class="t14" x="168" y="165" text-anchor="middle">Post · Comment</text>
  <text class="t12" x="168" y="181" text-anchor="middle">QueryDSL 동적 쿼리</text>

  <rect class="box" x="252" y="144" width="136" height="50" rx="4"/>
  <text class="t14" x="320" y="165" text-anchor="middle">Review</text>
  <text class="t12" x="320" y="181" text-anchor="middle">집계 컬럼 평점</text>

  <rect class="box" x="404" y="144" width="136" height="50" rx="4"/>
  <text class="t14" x="472" y="165" text-anchor="middle">AI Comment</text>
  <text class="t12" x="472" y="181" text-anchor="middle">비동기 폴링</text>

  <rect class="box" x="556" y="144" width="104" height="50" rx="4"/>
  <text class="t14" x="608" y="165" text-anchor="middle">News</text>
  <text class="t12" x="608" y="181" text-anchor="middle">크롤러</text>

  <!-- Support -->
  <text class="layer" x="20" y="260">SUPPORT</text>

  <line class="line-d" x1="168" y1="194" x2="168" y2="240" marker-end="url(#a)"/>
  <line class="line-d" x1="320" y1="194" x2="320" y2="240" marker-end="url(#a)"/>
  <line class="line-d" x1="472" y1="194" x2="472" y2="240" marker-end="url(#a)"/>
  <line class="line-d" x1="608" y1="194" x2="608" y2="240" marker-end="url(#a)"/>

  <rect class="box" x="100" y="240" width="136" height="50" rx="4"/>
  <text class="t14" x="168" y="261" text-anchor="middle">Popular Score</text>
  <text class="t12" x="168" y="277" text-anchor="middle">가중치 인기글</text>

  <rect class="box" x="252" y="240" width="136" height="50" rx="4"/>
  <text class="t14" x="320" y="261" text-anchor="middle">Category Stats</text>
  <text class="t12" x="320" y="277" text-anchor="middle">일간/주간/월간</text>

  <rect class="box" x="404" y="240" width="136" height="50" rx="4"/>
  <text class="t14" x="472" y="261" text-anchor="middle">View Count</text>
  <text class="t12" x="472" y="277" text-anchor="middle">인메모리 Write-Back</text>

  <rect class="box" x="556" y="240" width="104" height="50" rx="4"/>
  <text class="t14" x="608" y="261" text-anchor="middle">Like</text>
  <text class="t12" x="608" y="277" text-anchor="middle">게시글/댓글/리뷰</text>

  <!-- Infra -->
  <text class="layer" x="20" y="352">INFRA</text>

  <line class="line" x1="210" y1="290" x2="210" y2="332" marker-end="url(#a)"/>
  <line class="line" x1="360" y1="290" x2="360" y2="332" marker-end="url(#a)"/>
  <line class="line" x1="510" y1="290" x2="510" y2="332" marker-end="url(#a)"/>

  <rect class="box-infra" x="140" y="332" width="140" height="40" rx="4"/>
  <text class="t14" x="210" y="356" text-anchor="middle">MySQL 8.0</text>

  <rect class="box-infra" x="290" y="332" width="140" height="40" rx="4"/>
  <text class="t14" x="360" y="356" text-anchor="middle">Redis</text>

  <rect class="box-infra" x="440" y="332" width="140" height="40" rx="4"/>
  <text class="t14" x="510" y="356" text-anchor="middle">AWS S3</text>

  <!-- External -->
  <text class="layer" x="20" y="436">EXTERNAL</text>

  <line class="line-d" x1="270" y1="372" x2="270" y2="416" marker-end="url(#a)"/>
  <line class="line-d" x1="460" y1="372" x2="460" y2="416" marker-end="url(#a)"/>

  <rect class="box-ext" x="190" y="416" width="160" height="40" rx="4"/>
  <text class="t14" x="270" y="440" text-anchor="middle">OpenAI GPT-4o-mini</text>

  <rect class="box-ext" x="390" y="416" width="140" height="40" rx="4"/>
  <text class="t14" x="460" y="440" text-anchor="middle">Prometheus · Grafana</text>
</svg>
